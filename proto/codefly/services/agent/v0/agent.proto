syntax = "proto3";

package codefly.services.agent.v0;

/*
Agent
*/

// Language identifies an implementation language supported by an agent.
message Language {
  // Type enumerates implementation languages an agent can generate or analyze.
  enum Type {
    // GO is the Go language.
    GO = 0;
    // PYTHON is the Python language.
    PYTHON = 1;
    // JAVASCRIPT is the JavaScript language.
    JAVASCRIPT = 2;
    // TYPESCRIPT is the TypeScript language.
    TYPESCRIPT = 3;
    // RUBY is the Ruby language.
    RUBY = 4;
    // RUST is the Rust language.
    RUST = 5;
  }
  // type is the language represented by this entry.
  Type type = 1;
}

// Protocol identifies an API protocol supported by an agent.
message Protocol {
  // Type enumerates endpoint protocols an agent can expose.
  enum Type {
    // HTTP is a generic HTTP endpoint.
    HTTP = 0;
    // GRPC is a gRPC endpoint.
    GRPC = 1;
  }
  // type is the protocol represented by this entry.
  Type type = 1;
}

// Capability identifies one agent interface or lifecycle feature.
message Capability {
  // Type enumerates agent capabilities advertised to the CLI.
  enum Type {
    // UNKNOWN is the default value when type is not specified.
    UNKNOWN = 0;
    // BUILDER means the agent implements the Builder service.
    BUILDER = 1;
    // RUNTIME means the agent implements the Runtime service.
    RUNTIME = 2;
    // Hot Reload is a runtime where a running process will NOT be restarted
    HOT_RELOAD = 3;
  }
  // type is the advertised capability.
  Type type = 1;
}

// ValidationScope describes the semantic granularity an agent can validate.
// It is language- and runner-neutral; the agent owns translation to native
// package, file, or test-case selectors.
enum ValidationScope {
  // VALIDATION_SCOPE_UNSPECIFIED means no scope contract was declared.
  VALIDATION_SCOPE_UNSPECIFIED = 0;
  // VALIDATION_SCOPE_WORKSPACE validates the complete service source tree.
  VALIDATION_SCOPE_WORKSPACE = 1;
  // VALIDATION_SCOPE_PACKAGE validates one language package/module/crate.
  VALIDATION_SCOPE_PACKAGE = 2;
  // VALIDATION_SCOPE_FILE validates one canonical workspace-relative file.
  VALIDATION_SCOPE_FILE = 3;
  // VALIDATION_SCOPE_CASE validates one exact logical test case.
  VALIDATION_SCOPE_CASE = 4;
}

// TestDependencyMode declares which live service graph a named suite needs.
// Selection of validation targets remains separate from starting runtime
// prerequisites for one target's suite.
enum TestDependencyMode {
  // TEST_DEPENDENCY_MODE_UNSPECIFIED means the suite contract is incomplete.
  TEST_DEPENDENCY_MODE_UNSPECIFIED = 0;
  // TEST_DEPENDENCY_MODE_NONE initializes only the validation target.
  TEST_DEPENDENCY_MODE_NONE = 1;
  // TEST_DEPENDENCY_MODE_START_DEPENDENCIES starts the target's dependency
  // closure, but does not start the target service process.
  TEST_DEPENDENCY_MODE_START_DEPENDENCIES = 2;
  // TEST_DEPENDENCY_MODE_START_STACK starts dependencies and the target service.
  TEST_DEPENDENCY_MODE_START_STACK = 3;
}

// ValidationOperationCapability advertises one non-test validation operation.
message ValidationOperationCapability {
  // supported is authoritative when AgentInformation.validation is present.
  bool supported = 1;
  // scopes are the semantic granularities the operation accepts.
  repeated ValidationScope scopes = 2;
  // supports_fix is meaningful for lint and false for read-only operations.
  bool supports_fix = 3;
}

// TestSuiteCapability advertises one stable suite identity and its live graph.
message TestSuiteCapability {
  // name is the value accepted by Runtime.Test's suite selection.
  string name = 1;
  // dependency_mode controls which services remain live during this suite.
  TestDependencyMode dependency_mode = 2;
  // default_suite marks the suite selected when no explicit suite was supplied.
  bool default_suite = 3;
}

// TestValidationCapability advertises Runtime.Test behavior.
message TestValidationCapability {
  // supported is authoritative when AgentInformation.validation is present.
  bool supported = 1;
  // scopes are the semantic granularities Runtime.Test accepts.
  repeated ValidationScope scopes = 2;
  // suites are the named test suites the agent understands.
  repeated TestSuiteCapability suites = 3;
}

// ValidationCapabilities advertises the validation operations implemented by
// an agent. A nil AgentInformation.validation denotes a legacy agent whose RPCs
// must be compatibility-probed. A present message is authoritative: false
// means unsupported, while true requires the corresponding RPC to exist.
message ValidationCapabilities {
  // lint describes the Runtime.Lint operation.
  ValidationOperationCapability lint = 1;
  // compile describes Runtime.Build (native compile/typecheck/application build).
  ValidationOperationCapability compile = 2;
  // test describes Runtime.Test, its scopes, and named suites.
  TestValidationCapability test = 3;
  // audit describes Builder.Audit.
  ValidationOperationCapability audit = 4;
  // artifact_build describes Builder.Build's deployable artifact operation.
  ValidationOperationCapability artifact_build = 5;
  // sbom describes Builder.SBOM's authoritative component inventory.
  ValidationOperationCapability sbom = 6;
  // sync describes Builder.Sync, including non-mutating drift detection.
  ValidationOperationCapability sync = 7;
}

// Backend describes an execution environment a service can run in. It is
// orthogonal to Toolchain: a backend is HOW the service runs (native process,
// nix shell, container), a toolchain is WHAT the host needs for LOCAL mode.
message Backend {
  // Type enumerates supported execution backends.
  enum Type {
    // UNKNOWN is the default value when type is not specified.
    UNKNOWN = 0;
    // LOCAL runs the service's binary/interpreter directly on the host.
    LOCAL = 1;
    // NIX runs the service Docker-free inside a nix shell.
    NIX = 2;
    // DOCKER runs the service inside a container image.
    DOCKER = 3;
  }
  // type is a supported execution backend.
  Type type = 1;
}

// Toolchain describes a host toolchain a service needs to run in LOCAL mode.
message Toolchain {
  // Type enumerates language/tool toolchains an agent may require on the host.
  enum Type {
    // UNKNOWN is the default value when type is not specified.
    UNKNOWN = 0;
    // GO is the Go toolchain.
    GO = 1;
    // NPM is the Node/npm toolchain.
    NPM = 2;
    // PYTHON is the Python interpreter/toolchain.
    PYTHON = 3;
    // PYTHON_POETRY is the Python Poetry toolchain.
    PYTHON_POETRY = 4;
    // RUBY is the Ruby interpreter/toolchain.
    RUBY = 5;
    // RUBY_GEM is the RubyGems toolchain.
    RUBY_GEM = 6;
    // RUBY_BUNDLE is the Bundler toolchain.
    RUBY_BUNDLE = 7;
    // RUST is the Rust toolchain.
    RUST = 8;
    // CARGO is the Cargo build tool/package manager.
    CARGO = 9;
    // SWIFT is the Swift toolchain.
    SWIFT = 10;
  }
  // type is the required toolchain.
  Type type = 1;
  // version is the semantic or service-specific version for this toolchain.
  string version = 2;
}

// ConfigurationValueInformation documents one configuration field accepted by an agent.
message ConfigurationValueInformation {
  // name is the configuration field name.
  string name = 1;
  // description explains how to fill this configuration field.
  string description = 2;
}

// ConfigurationValueDetail groups related configuration fields for an agent.
message ConfigurationValueDetail {
  // name is the configuration detail group name.
  string name = 1;
  // description explains the configuration group shown in generated docs.
  string description = 2;
  // fields are agent-specific structured settings from service YAML.
  repeated ConfigurationValueInformation fields = 3;
}

// AgentTechnique documents an agent-supported workflow or prompt technique.
message AgentTechnique {
  // id is the stable identifier for this record.
  string id = 1;
  // name is the technique display name.
  string name = 2;
  // description explains when the technique should be used.
  string description = 3;
  // tags are labels used for filtering, grouping, or display.
  repeated string tags = 4;
  // prompt is the reusable instruction text for this technique.
  string prompt = 5;
}

// AgentInformation is the manifest and documentation surface returned by an agent.
message AgentInformation {
  reserved 1;                          // was `runtime_requirements` (Runtime); split into supported_backends + toolchains
  reserved "runtime_requirements";
  // capabilities describes which optional protocol features are supported.
  repeated Capability capabilities = 2;
  // protocols are endpoint protocols the agent can expose.
  repeated Protocol protocols = 3;
  // languages are source languages the agent can create, run, or analyze.
  repeated Language languages = 4;
  // read_me is the agent README or equivalent human-facing documentation.
  string read_me = 5;
  // configuration_details documents service YAML fields understood by the agent.
  repeated ConfigurationValueDetail configuration_details = 6;
  // techniques are reusable workflows or prompts the agent can apply.
  repeated AgentTechnique techniques = 7;
  // supported_backends are the execution environments the service can run in
  // (LOCAL/NIX/DOCKER), in PREFERENCE ORDER: element [0] is the backend the
  // plugin prefers, the rest are acceptable fallbacks in descending preference.
  // The CLI resolves a "free" service to the first supported backend that is
  // actually available in the environment (Docker reachable, nix installed,
  // toolchain present), unless the user overrides via preferences.yaml or an
  // explicit runtime context. Example: Go advertises [LOCAL, NIX, DOCKER] —
  // prefer native, then a nix shell, then a container.
  repeated Backend supported_backends = 8;
  // toolchains are host toolchains the user must have available to run the
  // service in LOCAL mode (ignored for NIX/DOCKER backends).
  repeated Toolchain toolchains = 9;
  // validation is the authoritative validation contract for new agents. It is
  // absent for legacy agents, which keeps compatibility RPC probing explicit.
  ValidationCapabilities validation = 10;
}

// AgentInformationRequest asks an agent to describe its capabilities and settings.
message AgentInformationRequest {

}


// --- Plugin Commands ---

// CommandDefinition describes a command that a plugin agent provides.
// Commands are registered at startup and routed through the Gateway.
message CommandDefinition {
  // name is the command name exposed by the plugin.
  string name = 1;             // e.g. "reset_db", "deploy", "migrate"
  // description tells users and agents when to run this command.
  string description = 2;     // "Reset the database to a clean state"
  // usage is the command-line shape shown to users and agents.
  string usage = 3;           // "! reset_db [--seed]"
  // aliases are alternate command names accepted by the plugin.
  repeated string aliases = 4; // ["reset-db", "db-reset"]
  // tags are labels used for filtering, grouping, or display.
  repeated string tags = 5;   // ["database", "destructive"]
  // plugin identifies the plugin that provides this command; empty means built-in.
  string plugin = 6;          // which plugin provides this command
  // destructive is true when the operation can mutate or delete user state.
  bool destructive = 7;       // if true, requires confirmation before execution
  // needs_gateway is true when the command must call through the Mind gateway.
  bool needs_gateway = 8;     // if true, requires a gateway connection
}

// ListCommandsRequest carries optional filters for listing commands.
message ListCommandsRequest {}

// ListCommandsResponse returns plugin and built-in commands available to callers.
message ListCommandsResponse {
  // commands are plugin or built-in commands available to callers.
  repeated CommandDefinition commands = 1;
}

// RunPluginCommandRequest invokes one plugin-provided command by name.
message RunPluginCommandRequest {
  // command is the plugin command name to run.
  string command = 1;
  // args are command arguments passed to the plugin command handler.
  repeated string args = 2;
}

// RunPluginCommandResponse reports command output and command-level failure details.
message RunPluginCommandResponse {
  // success is true when the requested operation completed successfully.
  bool success = 1;
  // output is raw command, build, lint, or test output preserved for diagnostics.
  string output = 2;
  // error explains why the operation failed; empty means success at this layer.
  string error = 3;
}

// Agent exposes plugin identity, metadata, and plugin-defined commands.
service Agent {
  // GetAgentInformation returns the agent manifest, capabilities, and configuration docs.
  rpc GetAgentInformation(AgentInformationRequest) returns (AgentInformation) {}

  // ListCommands returns the commands this plugin agent provides.
  rpc ListCommands(ListCommandsRequest) returns (ListCommandsResponse) {}

  // RunPluginCommand executes a plugin-provided command.
  rpc RunPluginCommand(RunPluginCommandRequest) returns (RunPluginCommandResponse) {}
}
