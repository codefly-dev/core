name: codefly core

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel an in-progress run when a new push to the same ref lands.
# A commit that's been superseded doesn't need to finish CI — saves
# minutes and shortens the feedback loop. Group by workflow+ref so
# main-branch pushes only cancel each other (not, say, a PR run).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Pull Alpine Image
        run: docker pull alpine:latest
        # We use it for tests
      - name: set up
        uses: actions/setup-go@v3
        with:
          go-version: '1.25'

      - name: checkout
        uses: actions/checkout@v4

      - name: Cache Go Modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go

      - name: Install Dependencies
        run: go mod tidy && go mod download

      - name: Install bubblewrap
        # Required by core/runners/sandbox bwrap backend and the
        # toolbox/launch sandbox_e2e tests. Default Ubuntu image
        # has it in the apt repo.
        run: sudo apt-get update && sudo apt-get install -y bubblewrap

      - name: Install Nix
        # Required by toolbox/nix nix_required tests. The
        # determinate-systems installer is the de-facto standard
        # for GH Actions: fast, deterministic, no daemon issues
        # on ephemeral runners.
        uses: DeterminateSystems/nix-installer-action@main
#
#      - name: golangci-lint
#        uses: golangci/golangci-lint-action@v3
#        with:
#          version: v1.55

      - name: govulncheck audit
        # Mirrors `codefly agent build`'s audit logic: runs govulncheck,
        # filters findings against .govulncheck.yaml suppressions, fails
        # only when an unsuppressed vuln has an upstream fix available
        # (unpatched-upstream issues can't be cleared by a rebuild).
        run: ./scripts/govulncheck.sh

      - name: generate test generate coverage
        # `-tags=sandbox_e2e,nix_required` opts into the integration
        # tests that depend on bubblewrap (sandbox_e2e) and the nix
        # binary (nix_required). Both deps installed above; default
        # builds (without these tags) skip them at compile time.
        run: go test ./... -tags=sandbox_e2e,nix_required -coverprofile=cover.out -covermode=atomic -coverpkg=./...

      - name: check test coverage
        id: coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yaml
          ## when token is not specified (value '') this feature is turned off
          ## in this example badge is created and committed only for main branch
          git-token: ${{ github.ref_name == 'main' && secrets.GH_PAT || '' }}
          ## name of branch where badges are stored
          ## ideally this should be orphan branch (see below how to create this branch)
          git-branch: badges
#
#      - name: test with race detection
#        run: go test -race ./... -v

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Build Failed in ${{ github.repository }} on ${{ github.ref }}. See GitHub Actions for more details."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Build Succeeded in ${{ github.repository }} on ${{ github.ref }}. Great job!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
