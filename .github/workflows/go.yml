name: codefly core

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel an in-progress run when a new push to the same ref lands.
# A commit that's been superseded doesn't need to finish CI — saves
# minutes and shortens the feedback loop. Group by workflow+ref so
# main-branch pushes only cancel each other (not, say, a PR run).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Pull Alpine Image
        run: docker pull alpine:latest
        # We use it for tests
      - name: set up
        uses: actions/setup-go@v3
        with:
          go-version: '1.25'

      - name: checkout
        uses: actions/checkout@v4

      - name: Cache Go Modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go

      - name: Install Dependencies
        run: go mod tidy && go mod download

      - name: Install apt deps (bubblewrap, ripgrep)
        # bubblewrap → core/runners/sandbox tests (default + sandbox_e2e)
        # ripgrep    → core/code search tests (real-repo grep coverage)
        # Both are part of the strict signal — codefly's security
        # stack and code-search depend on them, so a broken install
        # MUST fail CI. The retry loop handles transient mirror flakes
        # (azure.archive.ubuntu.com periodically hiccups for ~5-10
        # minutes); sustained outages still fail loud as intended.
        run: |
          for i in 1 2 3; do
            sudo apt-get update && sudo apt-get install -y bubblewrap ripgrep && exit 0
            echo "apt failed (attempt $i / 3); waiting 30s before retry"
            sleep 30
          done
          echo "apt install failed after 3 attempts" >&2
          exit 1

      - name: Install Nix
        # Strict — nix is core to the platform; if it doesn't install,
        # CI must fail loud rather than silently skipping nix tests.
        # DeterminateSystems' installer is the de-facto standard for
        # GH Actions: deterministic, no daemon issues on ephemeral
        # runners.
        uses: DeterminateSystems/nix-installer-action@main

      - name: Allow unprivileged user namespaces (for bwrap)
        # Ubuntu 24.04 ships with kernel.apparmor_restrict_unprivileged_userns=1
        # which blocks bubblewrap's user-namespace setup ("bwrap: setting
        # up uid map: Permission denied"). Disabling the restriction is
        # the standard CI workaround — bwrap then works in unprivileged
        # mode, which is what our sandbox layer expects.
        #
        # Note: this does NOT solve the secondary "bwrap: loopback:
        # Failed RTM_NEWADDR: Operation not permitted" issue — that's
        # CAP_NET_ADMIN inside the unshared netns, which GH-hosted
        # runners don't grant even after this sysctl. NetworkLoopback
        # tests on Linux fail loud and self-skip per
        # project_security_e2e.md; the sysctl is for the user-ns half.
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0
#
#      - name: golangci-lint
#        uses: golangci/golangci-lint-action@v3
#        with:
#          version: v1.55

      - name: govulncheck audit
        # Mirrors `codefly agent build`'s audit logic: runs govulncheck,
        # filters findings against .govulncheck.yaml suppressions, fails
        # only when an unsuppressed vuln has an upstream fix available
        # (unpatched-upstream issues can't be cleared by a rebuild).
        run: ./scripts/govulncheck.sh

      - name: generate test generate coverage
        # Single strict signal. -tags=sandbox_e2e,nix_required opts
        # into the integration tests that depend on bubblewrap (the
        # OS sandbox layer) and the nix binary. Both are installed
        # strict above; if either install failed, CI already failed
        # before reaching this step.
        #
        # NOT included: proto_companion_required. Those tests
        # (grpc_test.go, openapi_test.go) need the codeflydev/proto
        # Docker image which can't be built from core's CI alone
        # (it cross-builds the codefly CLI from a sibling checkout).
        # Run locally with `go test -tags=proto_companion_required`,
        # OR — once codefly CLI is installable in CI — bring the
        # image build into the workflow as `codefly companion build
        # proto` and add the tag here.
        run: go test ./... -tags=sandbox_e2e,nix_required -coverprofile=cover.out -covermode=atomic -coverpkg=./...

      - name: check test coverage
        id: coverage
        uses: vladopajic/go-test-coverage@v2
        with:
          config: ./.testcoverage.yaml
          ## when token is not specified (value '') this feature is turned off
          ## in this example badge is created and committed only for main branch
          git-token: ${{ github.ref_name == 'main' && secrets.GH_PAT || '' }}
          ## name of branch where badges are stored
          ## ideally this should be orphan branch (see below how to create this branch)
          git-branch: badges
#
#      - name: test with race detection
#        run: go test -race ./... -v

      - name: Notify Slack on Failure
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Build Failed in ${{ github.repository }} on ${{ github.ref }}. See GitHub Actions for more details."
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Notify Slack on Success
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          payload: |
            {
              "text": "Build Succeeded in ${{ github.repository }} on ${{ github.ref }}. Great job!"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
